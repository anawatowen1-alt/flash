<!-- Micro-interactions Script -->
<script>
        function simulateLogin() {
            const btn = event.currentTarget;
            const originalContent = btn.innerHTML;
            
            // Visual feedback
            btn.innerHTML = `
                <div class="flex items-center gap-3">
                    <span class="material-symbols-outlined animate-spin" data-icon="progress_activity">progress_activity</span>
                    Entering Game...
                </div>
            `;
            btn.classList.add('opacity-80', 'pointer-events-none');
            
            // Fake redirect delay
            setTimeout(() => {
                alert('Guest login successful! Starting your learning journey.');
                btn.innerHTML = originalContent;
                btn.classList.remove('opacity-80', 'pointer-events-none');
            }, 1500);
        }

        // Mouse parallax for the container
        document.addEventListener('mousemove', (e) => {
            const container = document.querySelector('.sticker-shadow');
            if (!container) return;
            
            const xAxis = (window.innerWidth / 2 - e.pageX) / 50;
            const yAxis = (window.innerHeight / 2 - e.pageY) / 50;
            
            // Subtly shift shadows based on mouse pos
            container.style.boxShadow = `${8 + (xAxis/2)}px ${8 + (yAxis/2)}px 0px 0px rgba(0, 93, 167, 0.15)`;
        });
    </script>
