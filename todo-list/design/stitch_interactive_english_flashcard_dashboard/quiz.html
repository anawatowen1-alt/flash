<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Flash Card Learning — Daily Quiz. Test your English vocabulary knowledge with multiple-choice questions.">
  <title>Flash Card Learning — Daily Quiz</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@400,0..1&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="page-quiz">

  <!-- Decorative blobs -->
  <div class="blob blob--br" aria-hidden="true"></div>
  <div class="blob blob--ml" aria-hidden="true"></div>

  <!-- ═══════════════ SIDEBAR (Desktop) ════════════════ -->
  <aside class="quiz-sidebar" aria-label="Navigation">
    <div style="margin-bottom:24px">
      <h1 class="sidebar-title">English Quest</h1>
      <p class="sidebar-subtitle">Daily Streak: 12 Days 🔥</p>
    </div>
    <nav style="flex:1;display:flex;flex-direction:column;gap:4px" aria-label="Navigation">
      <a href="study.html" class="sidebar-link">
        <span class="material-symbols-outlined" aria-hidden="true">home</span>
        Home
      </a>
      <a href="quiz.html" class="sidebar-link active" aria-current="page">
        <span class="material-symbols-outlined" aria-hidden="true">school</span>
        Daily Quiz
      </a>
      <a href="study.html" class="sidebar-link">
        <span class="material-symbols-outlined" aria-hidden="true">menu_book</span>
        All Words
      </a>
      <a href="#" class="sidebar-link">
        <span class="material-symbols-outlined" aria-hidden="true">leaderboard</span>
        Progress
      </a>
    </nav>
    <div style="margin-top:auto;padding-top:16px">
      <button class="sidebar-cta" style="background:var(--tertiary)">Upgrade to Pro</button>
    </div>
  </aside>

  <!-- ═══════════════ QUIZ LAYOUT ════════════════ -->
  <div class="quiz-layout" style="padding-left:0">

    <!-- Sticky Quiz Header -->
    <header class="quiz-header">
      <div class="flex items-center gap-3">
        <button class="icon-btn" aria-label="Close quiz" onclick="location.href='study.html'">
          <span class="material-symbols-outlined">close</span>
        </button>
        <h1 class="quiz-title">Daily Quiz</h1>
      </div>
      <div class="flex items-center gap-4">
        <div class="quiz-timer" aria-label="Time remaining" id="timer-display">
          <span class="material-symbols-outlined text-primary" aria-hidden="true">timer</span>
          <span id="timer-text">05:00</span>
        </div>
        <button class="icon-btn" aria-label="Quiz help">
          <span class="material-symbols-outlined">help_outline</span>
        </button>
      </div>
    </header>

    <!-- Quiz Main -->
    <div class="quiz-main" id="quiz-container">

      <!-- Progress Section -->
      <div role="region" aria-label="Quiz progress">
        <div class="quiz-progress-label">
          <span class="quiz-session-label">Current Session</span>
          <div class="quiz-question-counter">
            Question <span id="q-current">1</span>
            <span>of <span id="q-total">10</span></span>
          </div>
        </div>
        <div class="progress-track" role="progressbar" id="quiz-progressbar"
             aria-valuenow="10" aria-valuemin="0" aria-valuemax="100" aria-label="Quiz progress">
          <div class="progress-fill progress-fill--primary" id="quiz-progress-fill" style="width:10%"></div>
        </div>
      </div>

      <!-- Question Card -->
      <div class="question-card animate-in" id="question-card">
        <span class="tag tag--adj" id="q-pos">Adjective</span>
        <div class="question-word" id="q-word">Ebullient</div>
        <div class="question-divider"></div>
      </div>

      <!-- Options -->
      <div class="options-list animate-in" id="options-list" role="radiogroup" aria-label="Answer choices">
        <!-- Rendered by JS -->
      </div>

      <!-- Actions -->
      <div class="quiz-actions animate-in">
        <button class="btn-submit" id="submit-btn" disabled aria-disabled="true">
          Submit Answer
        </button>
        <button class="btn-skip" id="skip-btn" onclick="nextQuestion()">Skip Question</button>
      </div>

    </div><!-- /quiz-main -->

    <!-- ── RESULT SCREEN (hidden by default) ── -->
    <div id="result-screen" class="quiz-main" style="display:none;align-items:center;justify-content:center;text-align:center">
      <div class="card card-xl animate-in" style="max-width:480px;width:100%;padding:40px">
        <div style="font-size:4rem;margin-bottom:16px" aria-hidden="true">🎉</div>
        <h2 class="t-headline-lg text-primary" style="margin-bottom:8px">Quiz Complete!</h2>
        <p class="t-label text-muted" style="margin-bottom:24px">Great work on today's session</p>

        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px;margin-bottom:28px">
          <div class="stat-card" style="flex-direction:column;align-items:center;text-align:center;padding:12px">
            <div class="stat-label-text">Score</div>
            <div class="stat-value-text primary" id="result-score">0/10</div>
          </div>
          <div class="stat-card" style="flex-direction:column;align-items:center;text-align:center;padding:12px">
            <div class="stat-label-text">Accuracy</div>
            <div class="stat-value-text secondary" id="result-accuracy">0%</div>
          </div>
          <div class="stat-card" style="flex-direction:column;align-items:center;text-align:center;padding:12px">
            <div class="stat-label-text">XP Earned</div>
            <div class="stat-value-text tertiary" id="result-xp">+0</div>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:10px">
          <button class="btn-primary btn-block" onclick="location.href='study.html'">
            <span class="material-symbols-outlined" aria-hidden="true">style</span>
            Back to Study
          </button>
          <button class="btn-outline btn-block" onclick="restartQuiz()" style="border-radius:14px">
            <span class="material-symbols-outlined" aria-hidden="true">replay</span>
            Try Again
          </button>
        </div>
      </div>
    </div>

  </div><!-- /quiz-layout -->

  <!-- ═══════════════ BOTTOM NAV (Mobile) ════════════════ -->
  <nav class="bottom-nav" aria-label="Mobile navigation">
    <button onclick="location.href='study.html'" class="bottom-nav-btn">
      <span class="material-symbols-outlined" aria-hidden="true">style</span>
      Study
    </button>
    <button onclick="location.href='#'" class="bottom-nav-btn">
      <span class="material-symbols-outlined" aria-hidden="true">leaderboard</span>
      Stats
    </button>
    <button onclick="location.href='categories.html'" class="bottom-nav-btn">
      <span class="material-symbols-outlined" aria-hidden="true">category</span>
      Categories
    </button>
    <button onclick="location.href='quiz.html'" class="bottom-nav-btn active" aria-current="page">
      <span class="material-symbols-outlined icon-fill" aria-hidden="true">quiz</span>
      Quiz
    </button>
  </nav>

  <script src="app.js"></script>
</body>
</html>
