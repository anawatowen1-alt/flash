<html class="light" lang="en"><head>

<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .pixel-shadow {
            box-shadow: 8px 8px 0px 0px rgba(0, 0, 0, 0.1);
        }
        .option-selected {
            border-color: #005da7 !important;
            background-color: rgba(41, 118, 199, 0.05);
            transform: translateY(2px);
            box-shadow: 4px 4px 0px 0px rgba(0, 93, 167, 0.2);
        }
        .press-effect:active {
            transform: translateY(4px);
            box-shadow: 2px 2px 0px 0px rgba(0, 0, 0, 0.1);
        }
        .stepped-progress::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
        }
    </style>
</head>
<body class="bg-surface text-on-surface font-body-md">
<!-- Sidebar Navigation Shell -->
<aside class="hidden md:flex flex-col h-screen py-inner-padding h-full w-64 fixed left-0 top-0 bg-surface-container-low shadow-[8px_0px_0px_0px_rgba(0,0,0,0.15)] z-50">
<div class="px-inner-padding mb-10">
<h1 class="font-headline-lg text-headline-lg font-black text-primary">English Quest</h1>
<p class="font-label-md text-label-md text-on-surface-variant">Daily Streak: 12 Days</p>
</div>
<nav class="flex-1 space-y-2 px-4">
<a class="flex items-center gap-3 px-inner-padding py-3 rounded-lg text-on-surface-variant hover:bg-surface-variant/50 transition-colors font-label-md text-label-md" href="#">
<span class="material-symbols-outlined">home</span> Home
            </a>
<a class="flex items-center gap-3 px-inner-padding py-3 rounded-lg text-primary font-bold bg-primary-container/20 transition-colors font-label-md text-label-md" href="#">
<span class="material-symbols-outlined">school</span> Study
            </a>
<a class="flex items-center gap-3 px-inner-padding py-3 rounded-lg text-on-surface-variant hover:bg-surface-variant/50 transition-colors font-label-md text-label-md" href="#">
<span class="material-symbols-outlined">menu_book</span> All Words
            </a>
<a class="flex items-center gap-3 px-inner-padding py-3 rounded-lg text-on-surface-variant hover:bg-surface-variant/50 transition-colors font-label-md text-label-md" href="#">
<span class="material-symbols-outlined">leaderboard</span> Progress
            </a>
</nav>
<div class="px-4 mt-auto">
<button class="w-full py-4 bg-tertiary text-on-tertiary font-bold rounded-xl pixel-shadow press-effect">
                Upgrade to Pro
            </button>
</div>
</aside>
<!-- Main Content Canvas -->
<main class="md:ml-64 min-h-screen flex flex-col relative overflow-x-hidden">
<!-- Top App Bar -->
<header class="flex justify-between items-center px-container-margin py-base w-full sticky top-0 z-40 bg-surface-container-highest shadow-sm">
<div class="flex items-center gap-4">
<button class="md:hidden text-primary">
<span class="material-symbols-outlined">menu</span>
</button>
<h2 class="font-headline-lg-mobile text-headline-lg-mobile font-bold text-primary">Daily Quiz</h2>
</div>
<div class="flex items-center gap-6">
<div class="flex items-center gap-2 text-on-surface-variant font-label-md">
<span class="material-symbols-outlined text-primary">timer</span>
<span>04:52</span>
</div>
<button class="text-on-surface-variant hover:opacity-80 active:translate-y-0.5 transition-all">
<span class="material-symbols-outlined">help_outline</span>
</button>
</div>
</header>
<!-- Quiz Container -->
<div class="flex-1 max-w-4xl mx-auto w-full px-container-margin py-section-padding flex flex-col gap-base">
<!-- Progress Section -->
<div class="space-y-4 mb-4">
<div class="flex justify-between items-end">
<p class="font-label-md text-label-md text-primary uppercase tracking-widest">Current Session</p>
<p class="font-headline-lg-mobile text-headline-lg-mobile text-on-surface">Question 3 <span class="text-on-surface-variant font-normal">of 10</span></p>
</div>
<!-- Stepped Progress Bar -->
<div class="h-4 w-full bg-surface-container-high rounded-full overflow-hidden relative stepped-progress">
<div class="h-full bg-primary transition-all duration-700 ease-out flex justify-end items-center px-1" id="quiz-progress" style="width: 20%;">
<div class="w-1 h-2 bg-white/40 rounded-full"></div>
</div>
</div>
</div>
<!-- Question Card -->
<div class="relative group">
<div class="absolute -inset-1 bg-gradient-to-r from-primary to-secondary opacity-5 blur-xl group-hover:opacity-10 transition-opacity"></div>
<div class="relative bg-surface-container-lowest border-2 border-primary/10 rounded-[24px] min-h-[320px] flex flex-col items-center justify-center p-section-padding pixel-shadow text-center">
<span class="font-label-md text-label-md bg-secondary/10 text-secondary px-4 py-1 rounded-full mb-6">ADJECTIVE</span>
<h3 class="font-headline-xl text-headline-xl text-primary mb-2">Ebullient</h3>
<div class="w-16 h-1 bg-surface-variant rounded-full"></div>
</div>
</div>
<!-- Options Grid -->
<div class="grid grid-cols-1 gap-4 mt-8" id="options-container">
<!-- Option 1 -->
<button class="quiz-option group flex items-center justify-between p-inner-padding bg-surface-container-lowest border-2 border-surface-variant rounded-xl text-left transition-all hover:border-primary/30 pixel-shadow press-effect" onclick="selectOption(this)">
<span class="font-body-md text-body-md text-on-surface">Cheerful and full of energy</span>
<div class="w-6 h-6 rounded-full border-2 border-outline group-hover:border-primary flex items-center justify-center">
<div class="dot w-3 h-3 bg-primary rounded-full scale-0 transition-transform"></div>
</div>
</button>
<!-- Option 2 -->
<button class="quiz-option group flex items-center justify-between p-inner-padding bg-surface-container-lowest border-2 border-surface-variant rounded-xl text-left transition-all hover:border-primary/30 pixel-shadow press-effect" onclick="selectOption(this)">
<span class="font-body-md text-body-md text-on-surface">Likely to ignite or explode</span>
<div class="w-6 h-6 rounded-full border-2 border-outline group-hover:border-primary flex items-center justify-center">
<div class="dot w-3 h-3 bg-primary rounded-full scale-0 transition-transform"></div>
</div>
</button>
<!-- Option 3 -->
<button class="quiz-option group flex items-center justify-between p-inner-padding bg-surface-container-lowest border-2 border-surface-variant rounded-xl text-left transition-all hover:border-primary/30 pixel-shadow press-effect" onclick="selectOption(this)">
<span class="font-body-md text-body-md text-on-surface">Deeply saddened by loss</span>
<div class="w-6 h-6 rounded-full border-2 border-outline group-hover:border-primary flex items-center justify-center">
<div class="dot w-3 h-3 bg-primary rounded-full scale-0 transition-transform"></div>
</div>
</button>
<!-- Option 4 -->
<button class="quiz-option group flex items-center justify-between p-inner-padding bg-surface-container-lowest border-2 border-surface-variant rounded-xl text-left transition-all hover:border-primary/30 pixel-shadow press-effect" onclick="selectOption(this)">
<span class="font-body-md text-body-md text-on-surface">Very difficult to understand</span>
<div class="w-6 h-6 rounded-full border-2 border-outline group-hover:border-primary flex items-center justify-center">
<div class="dot w-3 h-3 bg-primary rounded-full scale-0 transition-transform"></div>
</div>
</button>
<!-- Option 5 -->
<button class="quiz-option group flex items-center justify-between p-inner-padding bg-surface-container-lowest border-2 border-surface-variant rounded-xl text-left transition-all hover:border-primary/30 pixel-shadow press-effect" onclick="selectOption(this)">
<span class="font-body-md text-body-md text-on-surface">Showing little or no emotion</span>
<div class="w-6 h-6 rounded-full border-2 border-outline group-hover:border-primary flex items-center justify-center">
<div class="dot w-3 h-3 bg-primary rounded-full scale-0 transition-transform"></div>
</div>
</button>
</div>
<!-- Sticky Bottom Actions -->
<div class="mt-12 flex flex-col items-center gap-4">
<button class="w-full max-w-sm py-4 bg-surface-variant text-on-surface-variant font-bold rounded-2xl pixel-shadow transition-all opacity-50 cursor-not-allowed" disabled="" id="submit-btn">
                    Submit Answer
                </button>
<a class="text-primary font-label-md text-label-md hover:underline decoration-2 underline-offset-4" href="#">Skip Question</a>
</div>
</div>
<!-- Decorative Background Element -->
<div class="fixed -bottom-24 -right-24 w-64 h-64 bg-primary/5 rounded-full blur-3xl pointer-events-none"></div>
<div class="fixed top-1/2 -left-32 w-96 h-96 bg-secondary/5 rounded-full blur-3xl pointer-events-none"></div>
</main>
<script>
        function selectOption(element) {
            // Remove selection from all options
            document.querySelectorAll('.quiz-option').forEach(opt => {
                opt.classList.remove('option-selected');
                opt.querySelector('.dot').classList.add('scale-0');
                opt.querySelector('.dot').classList.remove('scale-100');
            });

            // Add selection to clicked option
            element.classList.add('option-selected');
            element.querySelector('.dot').classList.remove('scale-0');
            element.querySelector('.dot').classList.add('scale-100');

            // Enable submit button
            const submitBtn = document.getElementById('submit-btn');
            submitBtn.disabled = false;
            submitBtn.classList.remove('bg-surface-variant', 'text-on-surface-variant', 'opacity-50', 'cursor-not-allowed');
            submitBtn.classList.add('bg-primary', 'text-on-primary', 'opacity-100', 'cursor-pointer', 'press-effect');
        }

        // Simple animation logic for progress
        window.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('quiz-progress').style.width = '20%';
            }, 300);
        });
    </script>
</body></html>
